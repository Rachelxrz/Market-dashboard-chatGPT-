name: Daily Dashboard

on:
  schedule:
    # Morning run — 09:00 America/New_York
    # EDT = 13:00 UTC
    # EST = 14:00 UTC
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'

    # Close run — 16:30 America/New_York
    # EDT = 20:30 UTC
    # EST = 21:30 UTC
    - cron: '30 20 * * *'
    - cron: '30 21 * * *'

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: morning or close'
        required: false
        default: 'morning'

permissions:
  contents: write

jobs:
  build-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show current time
        run: |
          echo "UTC time:"
          date -u
          echo "New York time:"
          TZ=America/New_York date

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai feedparser python-dateutil requests
          fi

      - name: Ensure docs directories exist
        run: |
          mkdir -p docs
          mkdir -p docs/history

      - name: Determine run mode
        id: runmode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.run_mode }}"
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)

            if [ "$MIN" = "30" ]; then
              MODE="close"
            else
              MODE="morning"
            fi
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Resolved run mode: $MODE"

      - name: Generate daily files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          TZ: America/New_York
          VLCC_PROXY_SYMBOL: DHT
          RUN_MODE: ${{ steps.runmode.outputs.mode }}
        run: |
          python scripts/generate_daily.py

      - name: Verify generated files
        run: |
          echo "Generated files:"
          ls -lah docs || true
          test -f docs/index.html
          test -f docs/reading.html
          test -f docs/monitor.json
          test -f docs/reading.json

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily dashboard (${{ steps.runmode.outputs.mode }})"
            git push
          fi
