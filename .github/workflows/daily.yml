name: Daily Dashboard Generator

on:
  schedule:
    # GitHub Actions 的 cron 是 UTC
    # 你想要 8:00 AM ET：大约是 13:00 UTC（冬令时），夏令时是 12:00 UTC
    # 先用 13:05 UTC 跑（冬令时准确），夏令时你可以改成 12:05 UTC

    - cron: "5 13 * * *"   # 09:05 EDT
    - cron: "5 14 * * *"   # 09:05 EST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/generate_daily.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily manifest.json
          git commit -m "Daily update" || echo "Nothing to commit"
          git push
