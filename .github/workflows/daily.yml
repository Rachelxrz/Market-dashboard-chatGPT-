<!doctype html>
<html lang="zh-CN">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>每日看板</title>

<style>

body{
font-family:system-ui,-apple-system;
background:#f5f7fb;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:25px;
border:1px solid #e5e7eb;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

.date{
font-size:20px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="date" id="date"></div>

<button onclick="openDoc('market_brief')">
市场简报
</button>

<button onclick="openDoc('reading')">
扩展阅读
</button>

<button onclick="openDoc('structure')">
结构监控
</button>

</div>

</div>

<script>

async function init(){

const r=await fetch("./daily/manifest.json?t="+Date.now())

const data=await r.json()

const latest=data.latest

document.getElementById("date").innerText="最新日期 "+latest

window.latest=latest

}

function openDoc(type){

location.href="viewer.html?date="+window.latest+"&doc="+type

}

init()

</script>

</body>
</html>
