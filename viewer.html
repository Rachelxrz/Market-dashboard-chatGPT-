<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Viewer</title>

  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei";margin:24px;line-height:1.65}
    a{color:#0b57d0}
    .top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .pill{padding:6px 10px;border:1px solid #ddd;border-radius:999px}
    #content{max-width:960px}
    pre{overflow:auto;background:#f6f8fa;padding:12px;border-radius:10px}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    blockquote{border-left:4px solid #ddd;margin:0;padding:0 0 0 12px;color:#444}
  </style>

  <!-- Markdown 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="top">
    <a href="./index.html">← 返回看板</a>
    <span id="meta" class="pill"></span>
  </div>

  <div id="content">加载中...</div>

  <script>
    function getParam(name){
      const u = new URL(location.href);
      return u.searchParams.get(name);
    }

    async function main(){
      const date = getParam('date');
      const doc  = getParam('doc');

      const label = doc === 'structure' ? '结构监控' : '每日扩展阅读';
      document.getElementById('meta').textContent = `${date} · ${label}`;

      const path = `./daily/${date}/${doc}.md`;

      try{
        const res = await fetch(path);
        if(!res.ok){
          throw new Error("文件读取失败: " + path);
        }

        const md = await res.text();

        // ⭐ 核心渲染
        document.getElementById('content').innerHTML = marked.parse(md);

      }catch(e){
        document.getElementById('content').innerHTML =
          `<p style="color:red;">加载失败：</p><pre>${e.message}</pre>`;
      }
    }

    main();
  </script>
</body>
</html>
