<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>每日阅读查看器</title>

  <style>
    :root{
      --bg:#f7f8fa;
      --card:#ffffff;
      --text:#1f2328;
      --muted:#6b7280;
      --link:#0b57d0;
      --border:#e5e7eb;
      --code:#f6f8fa;
      --danger:#c62828;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      line-height:1.75;
    }

    .wrap{
      max-width:1100px;
      margin:28px auto 48px;
      padding:0 20px;
    }

    .top{
      display:flex;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .back{
      color:var(--link);
      text-decoration:none;
      font-size:18px;
    }

    .back:hover{
      text-decoration:underline;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:52px;
      padding:0 24px;
      border:1px solid #d6d9de;
      border-radius:999px;
      background:#fff;
      font-size:18px;
      box-shadow:0 1px 2px rgba(0,0,0,.03);
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px 30px;
      box-shadow:0 8px 24px rgba(15,23,42,.04);
    }

    .status{
      color:var(--muted);
      font-size:15px;
      margin-bottom:14px;
    }

    #content{
      min-height:240px;
      word-break:break-word;
    }

    h1,h2,h3,h4,h5,h6{
      line-height:1.35;
      margin:1.2em 0 0.55em;
    }

    h1{font-size:30px}
    h2{font-size:24px}
    h3{font-size:20px}
    h4{font-size:18px}

    p{ margin:0 0 1em; }
    ul,ol{ padding-left:1.5em; margin:0 0 1em; }
    li{ margin:.35em 0; }
    a{ color:var(--link); }

    blockquote{
      margin:1em 0;
      padding:.8em 1em;
      border-left:4px solid #cfd8e3;
      background:#fafbfc;
      color:#374151;
      border-radius:8px;
    }

    pre{
      overflow:auto;
      background:var(--code);
      padding:14px 16px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      line-height:1.55;
    }

    code{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:.95em;
    }

    pre code{ background:transparent; padding:0; }
    :not(pre) > code{
      background:#f2f4f7;
      padding:.15em .4em;
      border-radius:6px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin:1em 0 1.2em;
      font-size:15px;
    }

    th,td{
      border:1px solid var(--border);
      padding:10px 12px;
      text-align:left;
      vertical-align:top;
    }

    th{ background:#f8fafc; }
    img{ max-width:100%; height:auto; border-radius:10px; }

    .error{
      color:var(--danger);
      font-weight:700;
      margin-bottom:10px;
    }

    .hint{ color:var(--muted); font-size:14px; }

    .pathbox{
      margin-top:10px;
      padding:12px 14px;
      background:#fff8f8;
      border:1px solid #f1c0c0;
      border-radius:10px;
      overflow:auto;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:14px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="./index.html">← 返回看板</a>
      <span id="meta" class="pill">加载中...</span>
    </div>

    <div class="card">
      <div id="status" class="status">正在加载内容...</div>
      <div id="content">加载中...</div>
    </div>
  </div>

  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (m) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
      });
    }

    function normalizeDoc(doc) {
      if (!doc) return 'reading';
      const d = String(doc).trim().toLowerCase();

      if (['reading','read','daily_reading','expand','expanded','extension','extended','extended_reading'].includes(d)) {
        return 'reading';
      }
      if (['market','brief','market_brief','news'].includes(d)) {
        return 'market';
      }
      if (['structure','monitor','risk','dashboard','structure_monitor'].includes(d)) {
        return 'structure';
      }
      return d;
    }

    function labelOf(doc) {
      if (doc === 'market') return '市场简报';
      if (doc === 'structure') return '结构监控';
      return '每日扩展阅读';
    }

    async function fetchText(path) {
      const res = await fetch(path + '?v=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
      return await res.text();
    }

    function renderMarkdown(md) {
      if (window.marked && typeof marked.parse === 'function') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(md);
      }
      return '<pre>' + escapeHtml(md) + '</pre>';
    }

    function candidatePaths(date, doc) {
      const groups = {
        reading: ['extended_reading.md','reading.md','extended.md'],
        market: ['market_brief.md','news.md','brief.md'],
        structure: ['structure.md','structure_monitor.md']
      };
      const names = groups[doc] || [`${doc}.md`];
      return names.flatMap(name => [
        `./daily/${date}/${name}`,
        `daily/${date}/${name}`,
        `./${date}/${name}`,
        `${date}/${name}`
      ]);
    }

    async function tryPaths(paths) {
      const errors = [];
      for (const path of paths) {
        try {
          const text = await fetchText(path);
          return { path, text };
        } catch (err) {
          errors.push(`${path} -> ${err.message}`);
        }
      }
      throw new Error(errors.join('\n'));
    }

    async function main() {
      const rawDate = getParam('date') || '';
      const rawDoc = getParam('doc') || getParam('type') || 'reading';
      const doc = normalizeDoc(rawDoc);
      const date = rawDate.trim();
      const label = labelOf(doc);

      document.getElementById('meta').textContent = `${date || '未指定日期'} · ${label}`;

      const statusEl = document.getElementById('status');
      const contentEl = document.getElementById('content');

      if (!date) {
        statusEl.textContent = '缺少 date 参数';
        contentEl.innerHTML = `
          <div class="error">页面参数不完整</div>
          <p>请用类似下面的地址打开：</p>
          <div class="pathbox">viewer.html?date=2026-03-06&doc=reading</div>
          <p class="hint">如果看结构监控，把 doc 改成 structure；如果看市场简报，把 doc 改成 market。</p>
        `;
        return;
      }

      const paths = candidatePaths(date, doc);

      try {
        statusEl.textContent = '正在读取 Markdown 文件...';
        const result = await tryPaths(paths);
        const md = (result.text || '').trim();

        if (!md) {
          statusEl.textContent = '文件已找到，但内容为空';
          contentEl.innerHTML = `
            <div class="error">文件内容为空</div>
            <p>已成功读取到文件，但该 Markdown 文件没有正文内容。</p>
            <div class="pathbox">${escapeHtml(result.path)}</div>
          `;
          return;
        }

        contentEl.innerHTML = renderMarkdown(md);
        statusEl.textContent = `已加载：${result.path}`;
        document.title = `${date} · ${label}`;
      } catch (err) {
        statusEl.textContent = '加载失败';
        contentEl.innerHTML = `
          <div class="error">内容加载失败</div>
          <p>下面这些路径都尝试过，但都没有成功：</p>
          <div class="pathbox">${escapeHtml(err.message)}</div>
          <p class="hint">请检查 daily/${escapeHtml(date)}/ 目录里是否真的存在对应 md 文件。</p>
        `;
      }
    }

    main();
  </script>
</body>
</html>
