<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Viewer</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei";margin:24px;line-height:1.65}
    a{color:#0b57d0}
    .top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .pill{padding:6px 10px;border:1px solid #ddd;border-radius:999px}
    #content{max-width:960px}
    pre{overflow:auto;background:#f6f8fa;padding:12px;border-radius:10px}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    blockquote{border-left:4px solid #ddd;margin:0;padding:0 0 0 12px;color:#444}
  </style>
  <!-- 用 CDN 的 marked.js 在浏览器里把 md 转成 html -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="top">
    <a href="./index.html">← 返回看板</a>
    <span id="meta" class="pill"></span>
  </div>

  <div id="content">加载中...</div>

  <script>
    function getParam(name){
      const u = new URL(location.href);
      return u.searchParams.get(name);
    }

    async function main(){
      const date = getParam('date');
      const doc  = getParam('doc'); // extended / structure

      const label = doc === 'structure' ? '结构监控' : '每日扩展阅读';
      document.getElementById('meta').textContent = `${date || '未知日期'} · ${label}`;

      if (!date || !doc){
        document.getElementById('content').textContent = '缺少参数：date 或 doc';
        return;
      }

      const path = `./daily/${date}/${doc}.md`;
      const res = await fetch(path, { cache: "no-store" });

      if (!res.ok){
        document.getElementById('content').innerHTML =
          `找不到文件：<code>${path}</code><br/>请确认目录与文件名是否正确。`;
        return;
      }

      const md = await res.text();
      document.getElementById('content').innerHTML = marked.parse(md);
    }

    main();
  </script>
</body>
</html>
