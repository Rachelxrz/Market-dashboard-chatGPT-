<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>每日看板</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei";margin:24px;line-height:1.5}
    h1{margin:0 0 12px}
    .hint{color:#666;margin:0 0 18px}
    .card{border:1px solid #ddd;border-radius:12px;padding:14px;margin:10px 0}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    a.btn{display:inline-block;padding:8px 10px;border:1px solid #ccc;border-radius:10px;text-decoration:none}
    a.btn:hover{border-color:#888}
    .date{font-weight:700}
    .title{color:#444}

    /* 风险颜色 */
    .risk-green { background: #e8f7ec; }
    .risk-yellow { background: #fff8e1; }
    .risk-orange { background: #ffe9e0; }
    .risk-red { background: #ffe5e5; }
  </style>
</head>
<body>
  <h1>每日看板</h1>
  <p class="hint">包含：每日扩展阅读 + 结构监控（按日期归档）</p>

  <div id="list"></div>

  <script>
    function getRiskClass(title){
      if(!title) return '';
      if(title.includes('🟢')) return 'risk-green';
      if(title.includes('🟡')) return 'risk-yellow';
      if(title.includes('🟠')) return 'risk-orange';
      if(title.includes('🔴')) return 'risk-red';
      return '';
    }

    async function main(){
      const root = document.getElementById('list');
      try{
        const res = await fetch('./manifest.json', { cache: "no-store" });
        if(!res.ok) throw new Error('manifest.json 读取失败：' + res.status);
        const data = await res.json();
        const days = (data.days || []).slice().reverse();

        if (!days.length){
          root.innerHTML = '<p>manifest.json 里没有 days 数据。</p>';
          return;
        }

        root.innerHTML = days.map(d => {
          const date = d.date;
          const title = d.title || '';
          const ext = `viewer.html?date=${encodeURIComponent(date)}&doc=extended`;
          const st  = `viewer.html?date=${encodeURIComponent(date)}&doc=structure`;
          return `
            <div class="card ${getRiskClass(title)}">
              <div><span class="date">${date}</span> <span class="title">${title}</span></div>
              <div class="row">
                <a class="btn" href="${ext}">查看：每日扩展阅读</a>
                <a class="btn" href="${st}">查看：结构监控</a>
              </div>
            </div>
          `;
        }).join('');
      }catch(e){
        root.innerHTML = `<p>加载失败：${e.message}</p>
                          <p>请检查 manifest.json 是否为有效 JSON。</p>`;
      }
    }
    main();
  </script>
</body>
</html>
